# ===================================================================
# MyAdvisor Application Configuration Example
# Copy this file to application.properties and customize as needed.
# ===================================================================

server.port=${PORT:8080}
logging.level.org.atmosphere = warn

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true
vaadin.allowed-packages = com.vaadin,org.vaadin,uct.myadvisor
spring.jpa.defer-datasource-initialization = true
spring.sql.init.mode = always

# Database Configuration (supports Environment Variables)
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database Connection URL (defaults to localhost:3306/MyAdvisor)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/MyAdvisor}

# Database Connection Username
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}

# Database Connection Password
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Spring Servlet upload limits
spring.servlet.multipart.max-file-size = 50MB
spring.servlet.multipart.max-request-size = 50MB

# HikariCP Database Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariCP-Pool

# ===================================================================
# Optional SSH Tunnel Configurations
# Used if your database requires tunneling through a jump host.
# ===================================================================

# Set to true to enable the SSH Tunnel setup during application startup
SSH_TUNNEL_ENABLED=false

# SSH jump host username
SSH_USER=example_user

# SSH jump host password (or configure key authentication in code)
SSH_PASSWORD=example_password

# SSH jump host hostname
SSH_HOST=example-ssh-host.com

# SSH port (default is 22)
SSH_PORT=22

# Remote host from SSH jump host perspective (default is localhost)
SSH_REMOTE_HOST=localhost

# Local port to bind the tunnel locally (default is 3306)
SSH_LOCAL_PORT=3306

# Remote database port to forward to (default is 3306)
SSH_REMOTE_PORT=3306
